name: py310
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Core scientific stack
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib

  # RDKit (CPU-only but works fine in GPU env)
  - rdkit

  # DO NOT install PyTorch from conda (CPU-only)
  # We will install GPU PyTorch via pip below

  - pip:
      # GPU-enabled PyTorch (CUDA 12.1)
      - torch==2.3.1
      - torchvision==0.18.1
      - torchaudio==2.3.1
      - --extra-index-url https://download.pytorch.org/whl/cu121

      # Other Python packages
      - descriptastorus
      - dgllife
      - lmdb
      - regex
      - torchmetrics
      - tqdm
      - transformers
      - typing_extensions
      - wandb
